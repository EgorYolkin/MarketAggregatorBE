services:
  redis:
    image: redis:7-alpine
    container_name: market-aggregator-redis
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-aggregator-app
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # App Config
      - PORT=8080
      - LOG_LEVEL=info
      - LOG_FORMAT=json

      # Redis Config - resolving through Docker built-in DNS
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # Worker Config
      - POLL_INTERVAL=30s
      - TRACKED_ASSETS=BTC,ETH,SOL,ADA,XRP
